[missing_codes]
codes = 9, -9, -8, -7, -6, -5, -4, -3, -2, -1

[mapping.gender]
source = X1SEX
target = gender
map_json = {
    "1": "Male",
    "2": "Female"
    }

[mapping.race]
source = X1RACE
target = race
map_json = {
    "1": "Am. Indian/Alaska Native",
    "2": "Asian",
    "3": "Black/African American",
    "4": "Hispanic",
    "5": "More than one race",
    "6": "Native Hawaiian/Pacific Islander",
    "7": "White"
    }

[mapping.ses]
source = X1SESQ5
target = ses_quintile
map_json = {
    "1": "Lowest",
    "2": "Second",
    "3": "Middle",
    "4": "Fourth",
    "5": "Highest"
    }

[mapping.stem_major]
source = X4RFDGMJSTEM
target = stem_major
map_json = {
    "0": "Non-STEM",
    "1": "STEM"
    }

[mapping.region]
source = X1REGION
target = region
map_json = {
    "1": "Northeast",
    "2": "Midwest",
    "3": "South",
    "4": "West"
    }

[mapping.state]
source = X1STATE
target = state

[mapping.stem_occupation]
type = map
source = X1PAR1OCC_STEM1, X1PAR2OCC_STEM1, X1MOMOCC_STEM1, X1DADOCC_STEM1
target = par1_stem_job, par2_stem_job, mom_stem_job, dad_stem_job
map_json = {
    "0": "Non-STEM Parent",
    "1": "STEM Parent",
    "2": "STEM Parent",
    "3": "STEM Parent",
    "4": "STEM Parent",
    "5": "STEM Parent",
    "6": "STEM Parent"
    }

[mapping.expected_stem_age30]
type = map
source = X1STU30OCC_STEM1, X2STU30OCC_STEM1, X4OCC30STEM1
target = expected_stem_2009, expected_stem_2012, expected_stem_2016
map_json = {
    "0": 0,
    "1": 1,
    "2": 1,
    "3": 1,
    "4": 1,
    "5": 1,
    "6": 1
    }

[mapping.math_ability_level]
source = X1TXMTSCOR
target = math_ability_level

[mapping.parent_education]
type = map
source = X1PAR1EDU, X2PAR1EDU
target = parent_edu_2009, parent_edu_2012
map_json = {
    "1": "Less than HS",
    "2": "HS Diploma/GED",
    "3": "Associate's",
    "4": "Bachelor's",
    "5": "Master's",
    "7": "Ph.D/Prof. Degree"
    }

[mapping.school_locale]
source = X1LOCALE
target = school_locale
map_json = {
    "1": "City",
    "2": "Suburb",
    "3": "Town",
    "4": "Rural"
    }

[mapping.family_income]
source = X1FAMINCOME
target = family_income
map_json = {
    "1": "Less than $15,000",
    "2": "$15,001-$35,000",
    "3": "$35,001-$55,000",
    "4": "$55,001-$75,000",
    "5": "$75,001-$95,000",
    "6": "$95,001-$115,000",
    "7": "$115,001-$135,000",
    "8": "$135,001-$155,000",
    "9": "$155,001-$175,000",
    "10": "$175,001-$195,000",
    "11": "$195,001-$215,000",
    "12": "$215,001-$235,000",
    "13": "$235,001 or more"
    }

[mapping.student_ed_expect]
source = X1STUEDEXPCT
target = student_ed_expect
map_json = {
    "1": "HS or Less",
    "2": "HS or Less",
    "3": "Associate's",
    "4": "Associate's",
    "5": "Bachelor's",
    "6": "Bachelor's",
    "7": "Graduate/Prof",
    "8": "Graduate/Prof",
    "9": "Graduate/Prof",
    "10": "Graduate/Prof",
    "11": "Unknown"
    }